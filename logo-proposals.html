<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Smart Vision - 04 Highest</title>
    <style>
      :root { --ink: #17202a; --muted: #5c6570; --soft: #f7f8f6; --paper: #ffffff; --line: #d9dfdf; }
      * { box-sizing: border-box; }
      body { margin: 0; color: var(--ink); background: var(--soft); font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      main { width: min(1120px, calc(100% - 40px)); margin: 0 auto; padding: 44px 0 64px; }
      h1 { margin: 0 0 8px; font-size: clamp(2rem, 5vw, 3.5rem); line-height: 1; }
      p { margin: 0 0 32px; color: var(--muted); }
      .grid { display: grid; gap: 18px; }
      article { display: grid; grid-template-columns: 150px minmax(0, 1fr); align-items: center; gap: 22px; padding: 24px; border: 1px solid var(--line); border-radius: 8px; background: var(--paper); }
      strong { color: var(--muted); font-size: 0.8rem; text-transform: uppercase; }
      img { display: block; width: 100%; height: auto; }
      @media (max-width: 680px) { article { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <main>
      <h1>Retour a 04 Highest</h1>
      <p>On repart de cette version. La premiere ligne est la reference que vous aviez choisie.</p>
      <div class="grid">
        <article><strong>04 Highest</strong><img src="assets/logo-proposals/logo-04-highest.svg" alt="04 Highest"></article>
        <article><strong>Longer line</strong><img src="assets/logo-proposals/logo-04-highest-slightly-longer.svg" alt="04 Highest longer line"></article>
        <article><strong>Slightly lower</strong><img src="assets/logo-proposals/logo-04-highest-slightly-lower.svg" alt="04 Highest slightly lower"></article>
      </div>
    </main>
  </body>
</html>
